name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Semver bump type"
        required: true
        type: choice
        default: "patch"
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Read current version
        id: current
        run: |
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]*' build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $VERSION"

      - name: Validate version is SNAPSHOT
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          if [[ "$CURRENT" != *-SNAPSHOT ]]; then
            echo "::error::Expected a SNAPSHOT version, got: $CURRENT"
            exit 1
          fi

      - name: Compute versions
        id: versions
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          BASE="${CURRENT%-SNAPSHOT}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          case "${{ inputs.bump_type }}" in
            patch)
              RELEASE="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
            minor)
              RELEASE="${MAJOR}.$((MINOR + 1)).0"
              ;;
            major)
              RELEASE="$((MAJOR + 1)).0.0"
              ;;
          esac

          # Validate computed version format
          if ! [[ "$RELEASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Computed release version has invalid format: $RELEASE"
            exit 1
          fi

          SNAPSHOT="${RELEASE}-SNAPSHOT"

          echo "release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "snapshot=$SNAPSHOT" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE"
          echo "Next snapshot:   $SNAPSHOT"

      # --- Release version bump ---
      - name: Bump to release version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.versions.outputs.release }}\"/" build.gradle.kts

      - name: Commit and push release version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "Version: bump ${{ steps.versions.outputs.release }}"
          git push origin master

      # --- Tag ---
      - name: Create and push release tag
        run: |
          RELEASE="${{ steps.versions.outputs.release }}"
          git tag -a "r${RELEASE}" -m "${RELEASE}"
          git push origin "r${RELEASE}"

      # --- Build and verify Confluent archive ---
      - name: Checkout release tag
        run: |
          git checkout "r${{ steps.versions.outputs.release }}"

      - name: Clean previous build artifacts
        run: |
          rm -rf build/confluentArchive build/confluent

      - name: Build Confluent archive
        run: |
          ./gradlew createConfluentArchive

      - name: Verify Confluent archive
        id: confluent_archive
        run: |
          RELEASE="${{ steps.versions.outputs.release }}"
          ARCHIVE_PATH="build/confluent/mongodb-kafka-connect-mongodb-${RELEASE}.zip"

          if [[ ! -f "$ARCHIVE_PATH" ]]; then
            echo "::error::Confluent archive not found at: $ARCHIVE_PATH"
            ls -la build/confluent/ 2>/dev/null || echo "build/confluent/ does not exist"
            exit 1
          fi

          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"
          echo "Confluent archive: $ARCHIVE_PATH ($(du -h "$ARCHIVE_PATH" | cut -f1))"

      # --- GitHub Release ---
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          RELEASE="${{ steps.versions.outputs.release }}"
          gh release create "r${RELEASE}" \
            --title "r${RELEASE}" \
            --generate-notes \
            "${{ steps.confluent_archive.outputs.archive_path }}"

      # --- Snapshot version bump ---
      - name: Checkout master
        run: |
          git checkout master

      - name: Bump to next snapshot version
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.versions.outputs.snapshot }}\"/" build.gradle.kts

      - name: Commit and push snapshot version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.gradle.kts
          git commit -m "Version: bump ${{ steps.versions.outputs.snapshot }}"
          git push origin master
